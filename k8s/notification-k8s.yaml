apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: medizen/notification-service:latest
        ports:
        - containerPort: 5008
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: NOTIFICATION_SERVICE_PORT
        - name: EMAIL_USER
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: EMAIL_USER
        - name: TWILIO_SID
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: TWILIO_SID
        - name: TWILIO_PHONE_NUMBER
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: TWILIO_PHONE_NUMBER
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: RABBITMQ_URL
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: MONGO_URI
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: EMAIL_PASS
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: TWILIO_AUTH_TOKEN
        livenessProbe:
          httpGet:
            path: /health
            port: 5008
          initialDelaySeconds: 20
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: default
spec:
  selector:
    app: notification-service
  ports:
  - port: 5008
    targetPort: 5008
  type: ClusterIP
