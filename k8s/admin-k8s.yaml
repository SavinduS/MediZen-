apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
      - name: admin-service
        image: medizen/admin-service:latest
        ports:
        - containerPort: 5009
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: ADMIN_SERVICE_PORT
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: AUTH_SERVICE_URL
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /health
            port: 5009
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: default
spec:
  selector:
    app: admin-service
  ports:
  - port: 5009
    targetPort: 5009
  type: ClusterIP
