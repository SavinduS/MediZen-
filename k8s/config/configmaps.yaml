apiVersion: v1
kind: ConfigMap
metadata:
  name: medizen-config
  namespace: default
data:
  # Admin Service
  ADMIN_SERVICE_PORT: "5009"
  AUTH_SERVICE_URL: "http://auth-service:5001/api/auth"
  PATIENT_SERVICE_URL: "http://patient-service:5002"

  # Payment Service
  PAYMENT_SERVICE_PORT: "5007"
  APPOINTMENT_SERVICE_URL: "http://appointment-service:5004/api/appointments"

  # Notification Service
  NOTIFICATION_SERVICE_PORT: "5008"
  EMAIL_USER: "medizen.system@example.com"
  TWILIO_SID: "YOUR_TWILIO_SID"
  TWILIO_PHONE_NUMBER: "YOUR_TWILIO_PHONE_NUMBER"
  RABBITMQ_URL: "amqp://rabbitmq-service:5672"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: doctor-config
  namespace: default
data:
  PORT: "5003"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: appointment-config
  namespace: default
data:
  PORT: "5004"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telemedicine-config
  namespace: default
data:
  PORT: "5006"
