# Deployment: Manages the pods (containers) for Doctor Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-deployment
spec:
  replicas: 1 # Run 1 instance of this service
  selector:
    matchLabels:
      app: doctor-service
  template:
    metadata:
      labels:
        app: doctor-service
    spec:
      containers:
      - name: doctor-service
        image: savindus/medizen-doctor-service:latest # This points to your docker image
        ports:
        - containerPort: 5003
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: DOCTOR_MONGO_URI
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: CLERK_SECRET_KEY
        envFrom:
        - configMapRef:
            name: doctor-config

---
# Service: Provides a stable IP address to access the pods
apiVersion: v1
kind: Service
metadata:
  name: doctor-service
spec:
  selector:
    app: doctor-service
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
  type: ClusterIP # Internal communication only (Gateway handles external)
