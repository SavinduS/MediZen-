apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: auth-service
          image: savindus/medizen-auth-service:latest
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: medizen-config
                  key: AUTH_SERVICE_PORT
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: medizen-secrets
                  key: CLERK_SECRET_KEY
            - name: CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: medizen-secrets
                  key: CLERK_PUBLISHABLE_KEY
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: medizen-secrets
                  key: MONGO_URI
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
  type: ClusterIP
