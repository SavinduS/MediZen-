apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
      - name: admin-service
        image: savindus/medizen-admin-service:latest
        ports:
        - containerPort: 5009
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: ADMIN_SERVICE_PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: NODE_ENV
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: MONGO_URI_ADMIN
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: AUTH_SERVICE_URL
        - name: DOCTOR_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: DOCTOR_SERVICE_URL
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: CLERK_SECRET_KEY
        - name: CLERK_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: CLERK_PUBLISHABLE_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
spec:
  selector:
    app: admin-service
  ports:
    - protocol: TCP
      port: 5009
      targetPort: 5009
  type: ClusterIP
