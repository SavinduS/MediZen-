apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
      - name: admin-service
        image: savindus/medizen-admin-service:latest
        ports:
        - containerPort: 5009
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5009
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5009
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: MONGO_URI
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: CLERK_SECRET_KEY
        envFrom:
        - configMapRef:
            name: medizen-config
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
spec:
  selector:
    app: admin-service
  ports:
    - protocol: TCP
      port: 5009
      targetPort: 5009
  type: ClusterIP
