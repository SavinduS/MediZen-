apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
      - name: appointment-service
        image: savindus/medizen-appointment-service:latest
        ports:
        - containerPort: 5004
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: APPOINTMENT_SERVICE_PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: NODE_ENV
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: MONGO_URI_APPOINTMENT
        - name: DOCTOR_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: DOCTOR_SERVICE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: JWT_SECRET
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: RABBITMQ_URL
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
spec:
  selector:
    app: appointment-service
  ports:
    - protocol: TCP
      port: 5004
      targetPort: 5004
  type: ClusterIP
