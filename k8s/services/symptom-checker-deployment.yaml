apiVersion: apps/v1
kind: Deployment
metadata:
  name: symptom-checker
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: symptom-checker
  template:
    metadata:
      labels:
        app: symptom-checker
    spec:
      containers:
      - name: symptom-checker
        image: savindus/medizen-ai-service:latest 
        ports:
        - containerPort: 5005
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-ai-service:27017/symptom_db" 
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: medizen-secrets
              key: GEMINI_API_KEY
        - name: PATIENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: medizen-config
              key: PATIENT_SERVICE_URL
