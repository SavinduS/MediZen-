apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-ai-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-ai
  template:
    metadata:
      labels:
        app: mongodb-ai
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        volumeMounts:
        - name: mongodb-ai-storage
          mountPath: /data/db
      volumes:
      - name: mongodb-ai-storage
        persistentVolumeClaim:
          claimName: mongodb-ai-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-ai-service
spec:
  selector:
    app: mongodb-ai
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017