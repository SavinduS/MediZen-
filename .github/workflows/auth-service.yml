name: Auth Service CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "services/auth-service/**" # Only trigger if files in this folder change
  pull_request:
    branches: ["main"]
    paths:
      - "services/auth-service/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: "npm"
          cache-dependency-path: "services/auth-service/package-lock.json"

      - name: Install dependencies
        run: |
          cd services/auth-service
          npm install

      # Optional: Add testing step here if you have tests
      # - name: Run Tests
      #   run: |
      #     cd services/auth-service
      #     npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          file: ./services/auth-service/Dockerfile
          push: true
          # Replace 'your-username' with your actual Docker Hub username
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-auth-service:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-auth-service:${{ github.sha }}
