name: AI Symptom Checker CI/CD

# Trigger the workflow on pushes to the main branch
# only if changes are made within the AI service folder
on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/symptom-checker-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code to the runner
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Log in to Docker Hub using GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 3: Build the Docker image and push it to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./services/symptom-checker-service
          push: true
          tags: savindus/medizen-ai-service:${{ github.sha }}, savindus/medizen-ai-service:latest

      # Step 4: Deploy to Kubernetes Cluster
      - name: Deploy to K8s
        uses: azure/k8s-deploy@v4
        with:
          action: deploy
          manifests: |
            k8s/symptom-checker-deployment.yaml
            k8s/symptom-checker-service.yaml
            k8s/secrets.yaml
            k8s/config-map.yaml
          images: |
            savindus/medizen-ai-service:${{ github.sha }}
          kubectl-version: 'latest'
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      # Step 5: Output success message
      - name: Completion Log
        run: echo "Deployment to Docker Hub and K8s successful for medizen-ai-service."