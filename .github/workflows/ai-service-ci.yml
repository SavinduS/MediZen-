name: AI Symptom Checker CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "services/symptom-checker-service/**"
  pull_request:
    branches: ["main"]
    paths:
      - "services/symptom-checker-service/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/symptom-checker-service
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-ai-service:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-ai-service:latest

      - name: Set K8s Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to K8s
        uses: azure/k8s-deploy@v4
        with:
          action: deploy
          manifests: |
            k8s/symptom-checker-deployment.yaml
            k8s/symptom-checker-service.yaml
            k8s/medizen-config-secrets.yaml
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-ai-service:${{ github.sha }}

      - name: Completion Log
        run: echo "Deployment to Docker Hub and K8s successful for medizen-ai-service."
