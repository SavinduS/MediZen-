name: AI Symptom Checker CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "services/symptom-checker-service/**"
  pull_request:
    branches: ["main"]
    paths:
      - "services/symptom-checker-service/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/symptom-checker-service
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-ai-service:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-ai-service:latest

      # Step 4: Output success message
      - name: Completion Log
        run: echo "Deployment to Docker Hub and K8s successful for medizen-ai-service."
