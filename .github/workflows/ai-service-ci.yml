name: AI Symptom Checker CI/CD

# Trigger the workflow on pushes to the main branch
# only if changes are made within the AI service folder
on:
  push:
    branches: ["main"]
    paths:
      - "services/symptom-checker-service/**"
  pull_request:
    branches: ["main"]
    paths:
      - "services/symptom-checker-service/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code to the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub using GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 3: Build the Docker image and push it to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/symptom-checker-service
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-ai-service:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-ai-service:latest

      # Step 4: Output success message
      - name: Completion Log
        run: echo "Deployment to Docker Hub and K8s successful for medizen-ai-service."
