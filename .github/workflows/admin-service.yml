name: Admin Service CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "services/admin-service/**"
  pull_request:
    branches: ["main"]
    paths:
      - "services/admin-service/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "services/admin-service/package-lock.json"

      - name: Install dependencies
        run: |
          cd services/admin-service
          npm install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Admin Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/admin-service
          file: ./services/admin-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-admin-service:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-admin-service:${{ github.sha }}

      - name: Set K8s Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to K8s
        uses: azure/k8s-deploy@v4
        with:
          action: deploy
          manifests: |
            k8s/admin-k8s.yaml
            k8s/medizen-config-secrets.yaml
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/medizen-admin-service:${{ github.sha }}
          kubectl-version: "latest"
