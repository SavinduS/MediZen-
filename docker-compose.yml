services:
  # Databases & Infrastructure
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27019:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - medizen-network

  mongodb-ai:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - medizen-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - medizen-network

  # Services
  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    environment:
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - MONGO_URI=mongodb://mongodb:27017/users
    depends_on:
      - mongodb
    networks:
      - medizen-network

  patient-service:
    build: ./services/patient-service
    ports:
      - "5002:5002"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/patients
    depends_on:
      - mongodb
    networks:
      - medizen-network

  doctor-service:
    build: ./services/doctor-service
    ports:
      - "5003:5003"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/doctor_db
    depends_on:
      - mongodb
    networks:
      - medizen-network

  appointment-service:
    build: ./services/appointment-service
    ports:
      - "5004:5004"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/appointment_db
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - medizen-network

  symptom-checker:
    build: ./services/symptom-checker-service
    ports:
      - "5005:5005"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGO_URI=mongodb://mongodb-ai:27017/symptom_db
      - PATIENT_SERVICE_URL=http://api-gateway:5010
    depends_on:
      - mongodb-ai
    networks:
      - medizen-network

  telemedicine-service:
    build: ./services/telemedicine-service
    ports:
      - "5006:5006"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/session_db
    depends_on:
      - mongodb
    networks:
      - medizen-network

  payment-service:
    build: ./services/payment-service
    ports:
      - "5007:5007"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/payment_db
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - medizen-network

  notification-service:
    build: ./services/notification-service
    ports:
      - "5008:5008"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/notification_db
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - medizen-network

  admin-service:
    build: ./services/admin-service
    ports:
      - "5009:5009"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/admin_db
      - DOCTOR_SERVICE_URL=http://api-gateway:5010
      - AUTH_SERVICE_URL=http://api-gateway:5010
    depends_on:
      - mongodb
    networks:
      - medizen-network

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "5010:5010"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5001
      - PATIENT_SERVICE_URL=http://patient-service:5002
      - DOCTOR_SERVICE_URL=http://doctor-service:5003
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5004
      - SYMPTOM_SERVICE_URL=http://symptom-checker:5005
      - TELEMEDICINE_SERVICE_URL=http://telemedicine-service:5006
      - PAYMENT_SERVICE_URL=http://payment-service:5007
      - NOTIFICATION_SERVICE_URL=http://notification-service:5008
      - ADMIN_SERVICE_URL=http://admin-service:5009
    networks:
      - medizen-network

  client:
    build: ./client
    ports:
      - "5173:80"
    environment:
      - VITE_GATEWAY_URL=http://localhost:5010
    depends_on:
      - api-gateway
    networks:
      - medizen-network

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - medizen-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - medizen-network

networks:
  medizen-network:
    driver: bridge

volumes:
  mongo-db-data:
  mongodb-data:
  symptom-data:
  grafana-storage:
  mongo_data:
