services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - medizen-network

  # Services
  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./services/auth-service/.env
    networks:
      - medizen-network

  patient-service:
    build: ./services/patient-service
    ports:
      - "5002:5002"
    env_file:
      - ./services/patient-service/.env
    networks:
      - medizen-network

  doctor-service:
    build: ./services/doctor-service
    ports:
      - "5003:5003"
    env_file:
      - ./services/doctor-service/.env
    networks:
      - medizen-network

  appointment-service:
    build: ./services/appointment-service
    ports:
      - "5004:5004"
    env_file:
      - ./services/appointment-service/.env
    environment:
      - DOCTOR_SERVICE_URL=http://doctor-service:5003/api/doctors
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - medizen-network

  symptom-checker:
    build: ./services/symptom-checker-service
    ports:
      - "5005:5005"
    env_file:
      - ./services/symptom-checker-service/.env
    environment:
      - PATIENT_SERVICE_URL=http://api-gateway:5010
    networks:
      - medizen-network

  telemedicine-service:
    build: ./services/telemedicine-service
    ports:
      - "5006:5006"
    env_file:
      - ./services/telemedicine-service/.env
    networks:
      - medizen-network

  payment-service:
    build: ./services/payment-service
    ports:
      - "5007:5007"
    env_file:
      - ./services/payment-service/.env
    environment:
      - PAYMENT_SERVICE_URL=http://payment-service:5007
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - medizen-network

  notification-service:
    build: ./services/notification-service
    ports:
      - "5008:5008"
    env_file:
      - ./services/notification-service/.env
    environment:
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - medizen-network

  admin-service:
    build: ./services/admin-service
    ports:
      - "5009:5009"
    env_file:
      - ./services/admin-service/.env
    environment:
      - DOCTOR_SERVICE_URL=http://api-gateway:5010
      - AUTH_SERVICE_URL=http://api-gateway:5010
    networks:
      - medizen-network

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "5010:5010"
    env_file:
      - ./services/api-gateway/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5001
      - PATIENT_SERVICE_URL=http://patient-service:5002
      - DOCTOR_SERVICE_URL=http://doctor-service:5003
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5004
      - SYMPTOM_SERVICE_URL=http://symptom-checker:5005
      - TELEMEDICINE_SERVICE_URL=http://telemedicine-service:5006
      - PAYMENT_SERVICE_URL=http://payment-service:5007
      - NOTIFICATION_SERVICE_URL=http://notification-service:5008
      - ADMIN_SERVICE_URL=http://admin-service:5009
    networks:
      - medizen-network

  client:
    build: 
      context: ./client
      args:
        VITE_GATEWAY_URL: "http://localhost:5010"
        VITE_CLERK_PUBLISHABLE_KEY: "pk_test_YnJhdmUtdnVsdHVyZS04Ni5jbGVyay5hY2NvdW50cy5kZXYk"
    ports:
      - "5173:80"
    env_file:
      - ./client/.env
    environment:
      - VITE_GATEWAY_URL=http://localhost:5010
    depends_on:
      - api-gateway
    networks:
      - medizen-network

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - medizen-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - medizen-network

networks:
  medizen-network:
    driver: bridge

volumes:
  grafana-storage:
